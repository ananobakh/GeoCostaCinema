{% extends "base.html" %}{% block content %}<h2>⏰ Showtimes</h2><form method="POST" action="{{ url_for("add_showtime") }}" style="background:white; padding:20px; border-radius:24px;"><select name="movie_id">{% for m in movies %}<option value="{{ m.id }}">{{ m.title }}</option>{% endfor %}</select><select name="hall_id">{% for h in halls %}<option value="{{ h.id }}">{{ h.hall_name }}</option>{% endfor %}</select><input type="datetime-local" name="start_time" required><input type="number" name="base_price" step="100" value="5000"><button type="submit">Add Showtime</button></form><ul>{% for st in showtimes %}<li>{{ st.movie.title }} at {{ st.start_time.strftime("%Y-%m-%d %H:%M") }} – {{ st.hall.hall_name }} – <a href="{{ url_for("delete_showtime", showtime_id=st.id) }}" onclick="return confirm('Delete?')">Delete</a></li>{% endfor %}</ul>{% endblock %}
