{% extends "base.html" %}{% block content %}<h2 style="color:white;">🎞️ All Movies</h2><form method="GET" style="background:rgba(255,255,255,0.2); padding:15px; border-radius:20px; margin-bottom:20px;"><select name="genre"><option value="">All Genres</option>{% for g in genres %}<option value="{{ g }}" {% if selected_genre==g %}selected{% endif %}>{{ g }}</option>{% endfor %}</select><button type="submit">Filter</button></form><div class="movie-grid">{% for m in movies %}<div class="movie-card"><h3>{{ m.title }}</h3><p>{{ m.genre }} | {{ m.release_year }} | ⭐{{ m.rating }}</p><a href="{{ url_for("movie_detail", movie_id=m.id) }}" class="btn">Details</a></div>{% endfor %}</div>{% endblock %}
