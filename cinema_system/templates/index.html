{% extends "base.html" %}{% block content %}<h1 style="color:white; text-shadow:2px 2px 4px rgba(0,0,0,0.3);">🎬 Now Showing</h1><div class="movie-grid">{% for movie in movies %}<div class="movie-card"><h3>{{ movie.title }}</h3><p>🎭 {{ movie.genre }} | 📅 {{ movie.release_year }}</p><p>⭐ {{ movie.rating }}/10</p><a href="{{ url_for("movie_detail", movie_id=movie.id) }}" class="btn">🎟️ Book now</a></div>{% endfor %}</div>{% endblock %}
