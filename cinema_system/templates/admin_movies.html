{% extends "base.html" %}{% block content %}<h2>🎬 Manage Movies</h2><a href="{{ url_for("add_movie") }}" class="btn">+ Add Movie</a><ul>{% for m in movies %}<li><strong>{{ m.title }}</strong> ({{ m.release_year }}) – <a href="{{ url_for("delete_movie", movie_id=m.id) }}" onclick="return confirm('Delete?')">Delete</a></li>{% endfor %}</ul>{% endblock %}
